name: Build agent image

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "extensions/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "docker/**"
      - "extensions/**"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Compute tag
        id: tag
        run: |
          PI_VERSION=$(grep -oE '0\.[0-9]+\.[0-9]+' docker/agent/Dockerfile | head -1)
          echo "tag=${PI_VERSION}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: catallaxy-agent:${{ steps.tag.outputs.tag }}

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (main)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/catallaxy-agent:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/catallaxy-agent:latest
